<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200">
  <rect width="480" height="200" rx="8" fill="#1e1e2e" stroke="#3b3b52" stroke-width="1.5"/>
  <!-- Header row -->
  <rect x="0" y="0" width="480" height="28" rx="8" fill="#2a2a3e"/>
  <rect x="0" y="20" width="480" height="8" fill="#2a2a3e"/>
  <!-- Column headers -->
  <rect x="0" y="28" width="480" height="22" fill="#252535"/>
  <text x="16" y="43" font-family="monospace" font-size="9" fill="#6b7280">Name</text>
  <text x="160" y="43" font-family="monospace" font-size="9" fill="#6b7280">Value</text>
  <text x="340" y="43" font-family="monospace" font-size="9" fill="#6b7280">Domain</text>
  <!-- Divider -->
  <line x1="0" y1="50" x2="480" y2="50" stroke="#3b3b52" stroke-width="1"/>
  <!-- Row 1 - other cookie -->
  <rect x="0" y="50" width="480" height="24" fill="#1e1e2e"/>
  <text x="16" y="66" font-family="monospace" font-size="9" fill="#9ca3af">__cfduid</text>
  <text x="160" y="66" font-family="monospace" font-size="9" fill="#9ca3af">d8f3a2…</text>
  <text x="340" y="66" font-family="monospace" font-size="9" fill="#9ca3af">.substack.com</text>
  <!-- Row 2 - connect.sid HIGHLIGHTED -->
  <rect x="0" y="74" width="480" height="26" fill="#ff4d2e" opacity="0.18"/>
  <rect x="0" y="74" width="3" height="26" fill="#ff4d2e"/>
  <text x="16" y="91" font-family="monospace" font-size="9" fill="#fca5a5" font-weight="bold">connect.sid</text>
  <text x="160" y="91" font-family="monospace" font-size="9" fill="#86efac" font-weight="bold">s:S0meLongValue…</text>
  <text x="340" y="91" font-family="monospace" font-size="9" fill="#9ca3af">.substack.com</text>
  <!-- Copy indicator -->
  <rect x="422" y="78" width="50" height="16" rx="3" fill="#ff4d2e" opacity="0.85"/>
  <text x="447" y="89" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">Copy ↗</text>
  <!-- Row 3 - other cookie -->
  <rect x="0" y="100" width="480" height="24" fill="#1e1e2e"/>
  <text x="16" y="116" font-family="monospace" font-size="9" fill="#9ca3af">_ga</text>
  <text x="160" y="116" font-family="monospace" font-size="9" fill="#9ca3af">GA1.2.…</text>
  <text x="340" y="116" font-family="monospace" font-size="9" fill="#9ca3af">.substack.com</text>
  <!-- Row 4 -->
  <rect x="0" y="124" width="480" height="24" fill="#252535" opacity="0.5"/>
  <text x="16" y="140" font-family="monospace" font-size="9" fill="#4b5563">substack.sid</text>
  <text x="160" y="140" font-family="monospace" font-size="9" fill="#4b5563">s%3Aencoded…</text>
  <text x="340" y="140" font-family="monospace" font-size="9" fill="#4b5563">.substack.com</text>
  <!-- Annotation arrow for value -->
  <line x1="160" y1="157" x2="160" y2="148" stroke="#ff4d2e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="168" font-family="sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle">Copy this value (starts with s:)</text>
  <!-- Replace notice -->
  <rect x="8" y="180" width="464" height="16" rx="4" fill="#fef3c7" opacity="0.15"/>
  <text x="240" y="191" font-family="sans-serif" font-size="9" fill="#fde68a" text-anchor="middle" opacity="0.8">📸 Replace with screenshot: Application → Cookies panel, connect.sid row selected</text>
</svg>
